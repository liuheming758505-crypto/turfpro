{% extends "base.html" %}{% block content %}

<section style="background:#14171f">
    <div class="max-w-7xl mx-auto px-6 py-20">
        <div class="max-w-3xl reveal">
            <div class="eyebrow mb-4" style="color:#3ab564"><span>●</span><span>AI ASSISTANT</span></div>
            <h1 class="text-4xl lg:text-5xl font-extrabold text-white tracking-tight mb-5">智能问诊</h1>
            <p class="text-slate-400 text-base lg:text-lg max-w-xl leading-relaxed">描述草坪问题，AI 帮你诊断、给建议、推荐产品。</p>
        </div>
    </div>
</section>

<section class="max-w-4xl mx-auto px-4 py-8">
    <div class="card overflow-hidden reveal">
        <div id="chatBox" class="h-96 overflow-y-auto p-6 space-y-4 bg-gradient-to-b from-gray-50 to-white">
            <div class="flex gap-3 items-start"><div class="w-8 h-8 rounded-full bg-emerald-600 flex items-center justify-center text-white text-sm shrink-0">AI</div><div class="bg-white rounded-2xl rounded-tl-sm p-4 shadow-sm max-w-[80%] text-sm text-gray-700 leading-relaxed">👋 您好！我是 TurfPro AI 助手。我可以帮您：<br><br>🌱 诊断草坪病害、虫害问题<br>🧪 推荐施肥方案<br>💧 解答灌溉疑问<br>📋 推荐适合的产品<br><br><span class="text-gray-400">请描述您的草坪问题，比如：<br>"果岭出现黄色斑块是什么原因？"</span></div></div>
        </div>
        <div class="p-4 border-t border-gray-100 flex gap-3 bg-white">
            <input id="questionInput" type="text" placeholder="描述您的草坪问题..." class="input flex-1" onkeydown="if(event.key==='Enter')ask()">
            <button onclick="ask()" class="btn btn-primary shrink-0">发送</button>
        </div>
    </div>
</section>
<script>
function ask(){
    const q=document.getElementById('questionInput');const text=q.value.trim();if(!text)return;
    q.value='';
    const box=document.getElementById('chatBox');
    box.innerHTML+=`<div class="flex gap-3 items-start justify-end"><div class="bg-emerald-600 text-white rounded-2xl rounded-tr-sm p-3 max-w-[80%] text-sm">${text}</div><div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-sm shrink-0">👤</div></div>`;
    box.innerHTML+=`<div class="flex gap-3 items-start" id="loading"><div class="w-8 h-8 rounded-full bg-emerald-600 flex items-center justify-center text-white text-sm shrink-0">AI</div><div class="bg-white rounded-2xl rounded-tl-sm p-4 shadow-sm max-w-[80%] text-sm text-gray-400"><span class="animate-pulse">⏳ 正在分析...</span></div></div>`;
    box.scrollTop=box.scrollHeight;
    fetch('/api/ai-ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:text})})
    .then(r=>r.json()).then(d=>{
        document.getElementById('loading').outerHTML=`<div class="flex gap-3 items-start"><div class="w-8 h-8 rounded-full bg-emerald-600 flex items-center justify-center text-white text-sm shrink-0">AI</div><div class="bg-white rounded-2xl rounded-tl-sm p-4 shadow-sm max-w-[80%] text-sm text-gray-700 leading-relaxed">${d.answer}</div></div>`;
        box.scrollTop=box.scrollHeight;
    }).catch(()=>{
        document.getElementById('loading').outerHTML=`<div class="flex gap-3 items-start"><div class="w-8 h-8 rounded-full bg-emerald-600 flex items-center justify-center text-white text-sm shrink-0">AI</div><div class="bg-white rounded-2xl rounded-tl-sm p-4 shadow-sm max-w-[80%] text-sm text-gray-500">抱歉，暂时无法回答。请稍后重试。</div></div>`;
    });
}
</script>
{% endblock %}

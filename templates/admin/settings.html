{% extends "base.html" %}{% block content %}
<section style="background:#14171f"><div class="max-w-7xl mx-auto px-6 py-8"><div class="max-w-3xl"><a href="/admin" class="font-mono text-[11px] text-slate-400 hover:text-white transition">← 返回后台</a><h1 class="text-3xl font-extrabold text-white tracking-tight mt-2">站点设置</h1></div></div></section>
<div class="max-w-4xl mx-auto px-6 py-6">
  <form method="POST" enctype="multipart/form-data" class="card p-8 space-y-5">
    <div class="grid grid-cols-2 gap-4">
      <div><label class="text-sm font-semibold text-gray-700 mb-1.5 block">站点名称</label><input name="site_name" value="{{ settings.site_name }}" class="input"></div>
      <div><label class="text-sm font-semibold text-gray-700 mb-1.5 block">Logo 文字</label><input name="logo_text" value="{{ settings.logo_text }}" class="input"></div>
    </div>
    <div><label class="text-sm font-semibold text-gray-700 mb-1.5 block">首页主标题</label><input name="hero_title" value="{{ settings.hero_title }}" class="input"></div>
    <div><label class="text-sm font-semibold text-gray-700 mb-1.5 block">首页副标题</label><textarea name="hero_subtitle" rows="2" class="input">{{ settings.hero_subtitle }}</textarea></div>
    <div><label class="text-sm font-semibold text-gray-700 mb-1.5 block">首页背景图 URL</label><input name="hero_image" value="{{ settings.hero_image }}" class="input" placeholder="https://images.unsplash.com/photo-...">
      {% if settings.hero_image %}<img src="{{ settings.hero_image }}" class="mt-2 h-24 rounded object-cover">{% endif %}
    </div>
    <div><label class="text-sm font-semibold text-gray-700 mb-1.5 block">上传 Logo 图片</label><input type="file" name="logo_file" accept="image/*" class="input"></div>
    <button type="submit" class="btn btn-ink">保存设置</button>
  </form>
</div>{% endblock %}

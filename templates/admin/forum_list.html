{% extends "base.html" %}{% block content %}
<section style="background:#14171f"><div class="max-w-7xl mx-auto px-6 py-8"><div class="max-w-3xl"><a href="/admin" class="font-mono text-[11px] text-slate-400 hover:text-white transition">← 返回后台</a><h1 class="text-3xl font-extrabold text-white tracking-tight mt-2">论坛管理</h1></div></div></section>
<div class="max-w-7xl mx-auto px-6 py-6">{% if items %}<div class="space-y-2">{% for p in items %}<div class="card p-4 flex items-center justify-between gap-4"><div class="flex-1 min-w-0"><p class="font-bold text-sm truncate">{{ p.title }}</p><p class="font-mono text-[10px] text-slate-500 mt-0.5">{{ p.author.username if p.author else '?' }} · 👁️ {{ p.views }} · 💬 {{ p.replies|length }}</p></div><a href="/admin/forum/delete/{{ p.id }}" class="badge bg-red-500 text-white shrink-0" onclick="return confirm('确定删除？')">删除</a></div>{% endfor %}</div>{% else %}<p class="text-slate-400 py-10 text-center">暂无帖子</p>{% endif %}</div>{% endblock %}

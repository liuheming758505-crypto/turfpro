{% extends "base.html" %}{% block content %}
<section style="background:#14171f"><div class="max-w-7xl mx-auto px-6 py-8"><div class="max-w-3xl"><a href="/admin/diagnose" class="font-mono text-[11px] text-slate-400 hover:text-white transition">← 返回诊断库</a><h1 class="text-3xl font-extrabold text-white tracking-tight mt-2">{{ '编辑条目' if item else '新建诊断条目' }}</h1></div></div></section>
<div class="max-w-4xl mx-auto px-6 py-6">
  <form method="POST" class="card p-8 space-y-5">
    <div class="grid grid-cols-3 gap-4">
      <div><label class="text-sm font-semibold text-gray-700 mb-1.5 block">名称 *</label><input name="name" value="{{ item.name if item else '' }}" class="input" required></div>
      <div><label class="text-sm font-semibold text-gray-700 mb-1.5 block">类型</label>
        <select name="ptype" class="input"><option value="disease" {% if item and item.ptype=='disease' %}selected{% endif %}>🦠 病害</option><option value="pest" {% if item and item.ptype=='pest' %}selected{% endif %}>🐛 虫害</option><option value="weed" {% if item and item.ptype=='weed' %}selected{% endif %}>🌿 杂草</option></select>
      </div>
      <div><label class="text-sm font-semibold text-gray-700 mb-1.5 block">危害等级</label>
        <select name="severity" class="input"><option value="高" {% if item and item.severity=='高' %}selected{% endif %}>高</option><option value="中" {% if item and item.severity=='中' or not item %}selected{% endif %}>中</option><option value="低" {% if item and item.severity=='低' %}selected{% endif %}>低</option></select>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div><label class="text-sm font-semibold text-gray-700 mb-1.5 block">拉丁学名</label><input name="latin_name" value="{{ item.latin_name if item else '' }}" class="input"></div>
      <div><label class="text-sm font-semibold text-gray-700 mb-1.5 block">高发季节</label><input name="season" value="{{ item.season if item else '' }}" class="input" placeholder="如：夏季(6-9月)"></div>
    </div>
    <div><label class="text-sm font-semibold text-gray-700 mb-1.5 block">概述</label><textarea name="summary" rows="2" class="input" placeholder="一句话描述">{{ item.summary if item else '' }}</textarea></div>
    <div><label class="text-sm font-semibold text-gray-700 mb-1.5 block">症状识别</label><textarea name="symptoms" rows="4" class="input">{{ item.symptoms if item else '' }}</textarea></div>
    <div><label class="text-sm font-semibold text-gray-700 mb-1.5 block">发生条件</label><textarea name="conditions" rows="3" class="input">{{ item.conditions if item else '' }}</textarea></div>
    <div><label class="text-sm font-semibold text-gray-700 mb-1.5 block">防治方案</label><textarea name="solution" rows="4" class="input">{{ item.solution if item else '' }}</textarea></div>
    <div><label class="text-sm font-semibold text-gray-700 mb-1.5 block">预防措施</label><textarea name="prevention" rows="3" class="input">{{ item.prevention if item else '' }}</textarea></div>
    <div><label class="text-sm font-semibold text-gray-700 mb-1.5 block">配图 URL</label><input name="image_url" value="{{ item.image_url if item else '' }}" class="input" placeholder="https://images.unsplash.com/photo-..."></div>
    <div class="flex gap-3"><button type="submit" class="btn btn-ink">{{ '保存修改' if item else '创建条目' }}</button><a href="/admin/diagnose" class="btn btn-outline">取消</a></div>
  </form>
</div>{% endblock %}

{% extends "base.html" %}{% block content %}
<section style="background:#14171f"><div class="max-w-7xl mx-auto px-6 py-8"><div class="max-w-3xl"><a href="/admin" class="font-mono text-[11px] text-slate-400 hover:text-white transition">← 返回后台</a><div class="flex items-center justify-between mt-2"><h1 class="text-3xl font-extrabold text-white tracking-tight">诊断库管理</h1><a href="/admin/diagnose/edit" class="btn text-xs !px-4 !py-2" style="background:#3ab564;color:#06230f">＋ 新建条目</a></div></div></div></section>
<div class="max-w-7xl mx-auto px-6 py-6">{% if items %}<div class="space-y-2">{% for p in items %}<div class="card p-4 flex items-center justify-between gap-4"><div class="flex-1 min-w-0"><p class="font-bold text-sm truncate">{{ p.name }} <span class="font-mono text-[10px] text-slate-500">({{ {'disease':'病害','pest':'虫害','weed':'杂草'}.get(p.ptype,p.ptype) }})</span></p><p class="font-mono text-[10px] text-slate-500 mt-0.5">{{ p.latin_name if p.latin_name else '' }}</p></div><div class="flex gap-2 shrink-0"><a href="/admin/diagnose/edit/{{ p.id }}" class="badge bg-white text-slate-500 border hover:bg-ink hover:text-white transition">编辑</a><a href="/admin/diagnose/delete/{{ p.id }}" class="badge bg-red-500 text-white" onclick="return confirm('确定删除？')">删除</a></div></div>{% endfor %}</div>{% else %}<p class="text-slate-400 py-10 text-center">暂无条目</p>{% endif %}</div>{% endblock %}

{% extends "base.html" %}{% block content %}
<section style="background:#14171f"><div class="max-w-7xl mx-auto px-6 py-8"><div class="max-w-3xl"><a href="/admin" class="font-mono text-[11px] text-slate-400 hover:text-white transition">← 返回后台</a><h1 class="text-3xl font-extrabold text-white tracking-tight mt-2">文章管理</h1></div></div></section>
<div class="max-w-7xl mx-auto px-6 py-6">
  {% if items %}<div class="space-y-2">{% for a in items %}
  <div class="card p-4 flex items-center justify-between gap-4"><div class="flex-1 min-w-0"><p class="font-bold text-sm truncate">{{ a.title }}</p><p class="font-mono text-[10px] text-slate-500 mt-0.5">{{ a.created_at.strftime('%Y-%m-%d') }} · 👁️ {{ a.views }} · 💬 {{ a.replies|length }} 回复</p></div><div class="flex gap-2 shrink-0"><a href="/admin/articles/toggle-pin/{{ a.id }}" class="badge text-xs {% if a.is_pinned %}bg-ink text-white{% else %}bg-white text-slate-500 border{% endif %}">{{ '置顶' if a.is_pinned else '置顶' }}</a><a href="/admin/articles/delete/{{ a.id }}" class="badge bg-red-500 text-white" onclick="return confirm('确定删除？')">删除</a></div></div>
  {% endfor %}</div>{% else %}<p class="text-slate-400 py-10 text-center">暂无文章</p>{% endif %}
</div>{% endblock %}

{% extends "base.html" %}{% block content %}
<section style="background:#14171f"><div class="max-w-7xl mx-auto px-6 py-8"><div class="max-w-3xl"><a href="/admin/news" class="font-mono text-[11px] text-slate-400 hover:text-white transition">← 返回资讯列表</a><h1 class="text-3xl font-extrabold text-white tracking-tight mt-2">{{ '编辑资讯' if item else '新建资讯' }}</h1></div></div></section>
<div class="max-w-4xl mx-auto px-6 py-6">
  <form method="POST" class="card p-8 space-y-5">
    <div><label class="text-sm font-semibold text-gray-700 mb-1.5 block">标题 *</label><input name="title" value="{{ item.title if item else '' }}" class="input" required placeholder="资讯标题"></div>
    <div class="grid grid-cols-2 gap-4">
      <div><label class="text-sm font-semibold text-gray-700 mb-1.5 block">作者</label><input name="author" value="{{ item.author if item else '编辑部' }}" class="input"></div>
      <div><label class="text-sm font-semibold text-gray-700 mb-1.5 block">来源</label><input name="source" value="{{ item.source if item else 'TurfPro' }}" class="input"></div>
    </div>
    <div><label class="text-sm font-semibold text-gray-700 mb-1.5 block">配图 URL</label><input name="image_url" value="{{ item.image_url if item else '' }}" class="input" placeholder="https://images.unsplash.com/photo-..."></div>
    <div><label class="text-sm font-semibold text-gray-700 mb-1.5 block">内容 *</label><textarea name="content" rows="12" class="input" required placeholder="资讯内容">{{ item.content if item else '' }}</textarea></div>
    <div class="flex gap-3"><button type="submit" class="btn btn-ink">{{ '保存修改' if item else '发布资讯' }}</button><a href="/admin/news" class="btn btn-outline">取消</a></div>
  </form>
</div>{% endblock %}

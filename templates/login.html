{% extends "base.html" %}{% block content %}
<!-- Login -->
<section class="min-h-[80vh] flex items-center bg-gray-50">
    <div class="max-w-md mx-auto px-4 w-full">
        <div class="card p-8 reveal">
            <div class="text-center mb-4">
                <span class="text-5xl mb-4 block">🌱</span>
                <h1 class="text-2xl font-bold">欢迎回来</h1>
                <p class="text-gray-500 text-sm mt-1">登录 TurfPro 专业草坪社区</p>
            </div>
            <form method="POST" class="space-y-4">
                <input type="text" name="username" placeholder="用户名" class="input" required>
                <input type="password" name="password" placeholder="密码" class="input" required>
                <button type="submit" class="btn btn-primary w-full justify-center">登录</button>
            </form>
            <p class="text-center text-sm text-gray-500 mt-6">还没有账号？<a href="/register" class="text-emerald-600 font-semibold hover:underline">立即注册</a></p>
        </div>
    </div>
</section>
{% endblock %}

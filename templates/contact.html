{% extends "base.html" %}{% block content %}

<section style="background:#14171f">
    <div class="max-w-7xl mx-auto px-6 py-20">
        <div class="max-w-3xl reveal">
            <div class="eyebrow mb-4" style="color:#3ab564"><span>●</span><span>CONTACT</span></div>
            <h1 class="text-4xl lg:text-5xl font-extrabold text-white tracking-tight mb-5">联系我们</h1>
            <p class="text-slate-400 text-base lg:text-lg max-w-xl leading-relaxed">合作、咨询、建议——期待您的来信。</p>
        </div>
    </div>
</section>

<section class="max-w-5xl mx-auto px-4 py-8">
    <div class="grid md:grid-cols-5 gap-4">
        <div class="md:col-span-2 space-y-4 reveal">
            <div class="card p-6 flex items-center gap-4"><div class="w-10 h-10 rounded-xl bg-emerald-50 flex items-center justify-center text-lg">📍</div><div><h3 class="font-bold text-sm">地址</h3><p class="text-gray-500 text-sm">中国 · 成都</p></div></div>
            <div class="card p-6 flex items-center gap-4"><div class="w-10 h-10 rounded-xl bg-emerald-50 flex items-center justify-center text-lg">📧</div><div><h3 class="font-bold text-sm">邮箱</h3><p class="text-gray-500 text-sm">contact@xfieldmate.cn</p></div></div>
            <div class="card p-6 flex items-center gap-4"><div class="w-10 h-10 rounded-xl bg-emerald-50 flex items-center justify-center text-lg">📞</div><div><h3 class="font-bold text-sm">电话</h3><p class="text-gray-500 text-sm">028-XXXX-XXXX</p></div></div>
        </div>
        <div class="md:col-span-3 reveal">
            <form method="POST" class="card p-8 space-y-4">
                <div class="grid grid-cols-2 gap-4"><input name="name" placeholder="姓名" class="input" required><input name="email" type="email" placeholder="邮箱" class="input" required></div>
                <textarea name="message" rows="4" placeholder="留言内容" class="input" required></textarea>
                <button type="submit" class="btn btn-primary w-full justify-center">发送留言</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}

{% extends "base.html" %}{% block content %}
<section style="background:#14171f"><div class="max-w-7xl mx-auto px-6 py-8"><div class="max-w-3xl"><div class="eyebrow mb-3" style="color:#3ab564"><span>●</span><span>PROFILE</span></div><h1 class="text-3xl font-extrabold text-white tracking-tight">个人中心</h1></div></div></section>

<div class="max-w-3xl mx-auto px-6 py-6 space-y-6">
  <!-- 基本信息 -->
  <div class="card p-8">
    <h2 class="font-bold text-lg mb-5">基本信息</h2>
    <form method="POST" class="space-y-4">
      <input type="hidden" name="action" value="info">
      <div class="grid md:grid-cols-2 gap-4">
        <div><label class="text-sm font-semibold text-gray-700 mb-1 block">邮箱</label><input value="{{ current_user.email }}" class="input bg-gray-50" disabled></div>
        <div><label class="text-sm font-semibold text-gray-700 mb-1 block">手机号</label><input name="phone" value="{{ current_user.phone or '' }}" class="input" placeholder="选填"></div>
        <div><label class="text-sm font-semibold text-gray-700 mb-1 block">单位名称</label><input name="company" value="{{ current_user.company or '' }}" class="input" placeholder="选填"></div>
      </div>
      <button type="submit" class="btn btn-ink">保存信息</button>
    </form>
  </div>

  <!-- 改用户名 -->
  <div class="card p-8">
    <h2 class="font-bold text-lg mb-5">修改用户名</h2>
    <form method="POST" class="space-y-4">
      <input type="hidden" name="action" value="username">
      <div><label class="text-sm font-semibold text-gray-700 mb-1 block">当前用户名</label><input value="{{ current_user.username }}" class="input bg-gray-50" disabled></div>
      <div><label class="text-sm font-semibold text-gray-700 mb-1 block">新用户名</label><input name="username" value="{{ current_user.username }}" class="input" required placeholder="输入新用户名"></div>
      <button type="submit" class="btn btn-ink">修改用户名</button>
    </form>
  </div>

  <!-- 改密码 -->
  <div class="card p-8">
    <h2 class="font-bold text-lg mb-5">修改密码</h2>
    <form method="POST" class="space-y-4">
      <input type="hidden" name="action" value="password">
      <div><label class="text-sm font-semibold text-gray-700 mb-1 block">当前密码</label><div class="relative"><input type="password" name="current_password" id="prof-pw1" class="input pr-10" required placeholder="输入当前密码"><button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-ink" onclick="var i=document.getElementById('prof-pw1');i.type=i.type==='password'?'text':'password'"><svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
      <div><label class="text-sm font-semibold text-gray-700 mb-1 block">新密码</label><div class="relative"><input type="password" name="new_password" id="prof-pw2" class="input pr-10" required placeholder="至少4位"><button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-ink" onclick="var i=document.getElementById('prof-pw2');i.type=i.type==='password'?'text':'password'"><svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
      <button type="submit" class="btn btn-ink">修改密码</button>
    </form>
  </div>
</div>
{% endblock %}
